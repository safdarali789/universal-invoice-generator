<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pencil Sketch Creator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F7F5F0;
    --paper-2: #EFEBE2;
    --graphite: #2B2B2B;
    --pencil: #6B6B6B;
    --pencil-light: #9C9C94;
    --eraser: #D9A5A0;
    --eraser-dark: #C2837D;
    --blueline: #A9C4D4;
    --line: #D8D2C3;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    background:var(--paper);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(169,196,212,0.10), transparent 40%),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.012) 0px, rgba(0,0,0,0.012) 1px, transparent 1px, transparent 3px);
    color:var(--graphite);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }

  .sketch-font{ font-family:'Architects Daughter', cursive; }

  .wrap{
    max-width:720px;
    margin:0 auto;
    padding:28px 18px 60px;
  }

  header{
    text-align:center;
    margin-bottom:28px;
    position:relative;
  }

  header .pencil-icon{
    font-size:34px;
    display:block;
    margin-bottom:6px;
    transform:rotate(-8deg);
  }

  h1{
    font-family:'Architects Daughter', cursive;
    font-size:2.1rem;
    margin:0 0 4px;
    color:var(--graphite);
    line-height:1.3;
  }

  .subtitle{
    color:var(--pencil);
    font-size:0.95rem;
    margin:0;
  }

  .card{
    background:#fff;
    border:1.5px solid var(--graphite);
    border-radius:3px;
    padding:20px;
    margin-bottom:22px;
    box-shadow: 4px 4px 0 rgba(43,43,43,0.08);
    position:relative;
  }

  .card::before{
    content:'';
    position:absolute;
    top:-1px; left:-1px; right:-1px; bottom:-1px;
    border:1px dashed transparent;
    pointer-events:none;
  }

  label{
    display:block;
    font-size:0.85rem;
    color:var(--pencil);
    margin-bottom:6px;
    font-weight:600;
  }

  textarea{
    width:100%;
    min-height:90px;
    padding:12px;
    border:1.5px solid var(--line);
    border-radius:2px;
    background:var(--paper);
    font-family:'Inter', sans-serif;
    font-size:1rem;
    color:var(--graphite);
    resize:vertical;
    line-height:1.7;
  }

  textarea:focus, select:focus{
    outline:none;
    border-color:var(--blueline);
    box-shadow:0 0 0 3px rgba(169,196,212,0.3);
  }

  .row{
    display:flex;
    gap:12px;
    margin-top:16px;
    flex-wrap:wrap;
  }

  .field{
    flex:1;
    min-width:140px;
  }

  select{
    width:100%;
    padding:10px;
    border:1.5px solid var(--line);
    border-radius:2px;
    background:#fff;
    font-size:0.92rem;
    color:var(--graphite);
    font-family:inherit;
  }

  .style-chips{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:8px;
  }

  .chip{
    padding:7px 14px;
    border:1.5px solid var(--line);
    border-radius:20px;
    background:#fff;
    font-size:0.82rem;
    color:var(--pencil);
    cursor:pointer;
    transition:all 0.15s ease;
    user-select:none;
  }

  .chip:hover{ border-color:var(--pencil-light); }

  .chip.active{
    background:var(--graphite);
    color:var(--paper);
    border-color:var(--graphite);
  }

  button.generate{
    width:100%;
    margin-top:20px;
    padding:15px;
    background:var(--graphite);
    color:var(--paper);
    border:none;
    border-radius:2px;
    font-size:1.05rem;
    font-weight:600;
    cursor:pointer;
    font-family:'Architects Daughter', cursive;
    letter-spacing:0.3px;
    transition:transform 0.1s ease, background 0.15s ease;
    position:relative;
  }

  button.generate:active{ transform:translateY(1px); }
  button.generate:hover{ background:#3d3d3d; }

  button.generate:disabled{
    background:var(--pencil-light);
    cursor:wait;
  }

  .result-area{
    margin-top:24px;
    text-align:center;
  }

  .sketch-frame{
    display:inline-block;
    background:#fff;
    padding:14px 14px 36px;
    border-radius:2px;
    box-shadow:0 8px 24px rgba(43,43,43,0.18), 0 1px 0 rgba(0,0,0,0.05);
    transform:rotate(-1.2deg);
    max-width:100%;
    position:relative;
  }

  .sketch-frame::after{
    content:'';
    position:absolute;
    bottom:8px; left:50%;
    transform:translateX(-50%);
    width:40px; height:2px;
    background:var(--eraser);
    border-radius:2px;
    opacity:0.6;
  }

  .sketch-frame img{
    max-width:100%;
    display:block;
    border-radius:1px;
    background:var(--paper-2);
    min-height:200px;
  }

  .caption{
    font-family:'Architects Daughter', cursive;
    color:var(--pencil);
    font-size:0.95rem;
    margin-top:6px;
  }

  .status{
    text-align:center;
    color:var(--pencil);
    font-size:0.9rem;
    margin-top:16px;
    min-height:20px;
  }

  .status.error{ color:var(--eraser-dark); font-weight:600; }

  .loading-dots span{
    display:inline-block;
    width:6px; height:6px;
    background:var(--pencil);
    border-radius:50%;
    margin:0 2px;
    animation:bounce 1.2s infinite ease-in-out;
  }
  .loading-dots span:nth-child(2){ animation-delay:0.15s; }
  .loading-dots span:nth-child(3){ animation-delay:0.3s; }

  @keyframes bounce{
    0%, 80%, 100% { transform:translateY(0); opacity:0.4; }
    40% { transform:translateY(-6px); opacity:1; }
  }

  .actions{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-top:18px;
    flex-wrap:wrap;
  }

  .actions button{
    padding:10px 18px;
    border:1.5px solid var(--graphite);
    background:#fff;
    color:var(--graphite);
    border-radius:20px;
    font-size:0.85rem;
    cursor:pointer;
    font-weight:600;
  }

  .actions button:hover{ background:var(--graphite); color:var(--paper); }

  .history{
    margin-top:32px;
  }

  .history h3{
    font-family:'Architects Daughter', cursive;
    font-size:1.1rem;
    color:var(--pencil);
    margin-bottom:10px;
    text-align:center;
  }

  .history-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:8px;
  }

  .history-grid img{
    width:100%;
    aspect-ratio:1;
    object-fit:cover;
    border-radius:3px;
    border:1.5px solid var(--line);
    cursor:pointer;
    transition:border-color 0.15s;
  }

  .history-grid img:hover{ border-color:var(--blueline); }

  footer{
    text-align:center;
    margin-top:36px;
    color:var(--pencil-light);
    font-size:0.78rem;
  }

  @media (max-width:420px){
    h1{ font-size:1.7rem; }
    .card{ padding:16px; }
  }

</style>
</head>
<body>

<div class="wrap">

  <header>
    <span class="pencil-icon">✏️</span>
    <h1>Pencil Sketch Creator</h1>
    <p class="subtitle">Describe your idea, and AI will turn it into a pencil sketch</p>
  </header>

  <div class="card">

    <label for="prompt">What would you like to create?</label>
    <textarea id="prompt" placeholder="e.g. An old man drinking tea, a village house near the mountains..."></textarea>

    <label style="margin-top:16px;">Sketch Style</label>
    <div class="style-chips" id="styleChips">
      <div class="chip active" data-style="pencil sketch, graphite drawing, detailed shading, hand drawn, black and white">Graphite Pencil</div>
      <div class="chip" data-style="charcoal sketch drawing, dramatic shading, artistic, black and white">Charcoal</div>
      <div class="chip" data-style="ink pen sketch, cross hatching, line art, detailed">Pen Sketch</div>
      <div class="chip" data-style="colored pencil sketch, soft shading, artistic illustration">Colored Pencil</div>
      <div class="chip" data-style="watercolor pencil sketch, soft tones, artistic">Watercolor</div>
    </div>

    <div class="row" id="sizeRow">
      <div class="field">
        <label>Size</label>
        <select id="size">
          <option value="1024x1024">Square (1024×1024)</option>
          <option value="1024x1536">Portrait (1024×1536)</option>
          <option value="1536x1024">Landscape (1536×1024)</option>
        </select>
      </div>
    </div>

    <button class="generate" id="genBtn" onclick="generateSketch()">Generate Sketch</button>
  </div>

  <div class="status" id="status"></div>

  <div class="result-area" id="resultArea"></div>

  <div class="history" id="historySection" style="display:none;">
    <h3>Recent Sketches</h3>
    <div class="history-grid" id="historyGrid"></div>
  </div>

  <footer>
    Powered by free public AI image generation • No login required
  </footer>

</div>

<script>
let history = [];

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
  });
});

function getActiveStyle(){
  const active = document.querySelector('.chip.active');
  return active ? active.dataset.style : 'pencil sketch, graphite drawing, detailed shading';
}

function setStatus(msg, isError){
  const el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = 'status' + (isError ? ' error' : '');
}

function buildPrompt(userText){
  const style = getActiveStyle();
  return `${userText}, ${style}, fine line detail, high contrast, white paper background, professional sketch art`;
}

async function generateSketch(){
  const promptInput = document.getElementById('prompt').value.trim();
  if(!promptInput){
    setStatus('Please describe what you would like to create first.', true);
    return;
  }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = 'Generating...';
  setStatus('<span class="loading-dots"><span></span><span></span><span></span></span> Creating your sketch, this can take up to 30 seconds...');
  document.getElementById('resultArea').innerHTML = '';

  const fullPrompt = buildPrompt(promptInput);
  const size = document.getElementById('size').value;
  const [w, h] = size.split('x');
  const seed = Math.floor(Math.random() * 1000000);
  const encodedPrompt = encodeURIComponent(fullPrompt);
  const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=${w}&height=${h}&seed=${seed}&model=flux`;

  const img = new Image();
  let settled = false;

  const finish = (success) => {
    if(settled) return;
    settled = true;
    clearTimeout(timeoutId);
    btn.disabled = false;
    btn.textContent = 'Generate Sketch';

    if(success){
      setStatus('');
      showResult(imageUrl, promptInput);
      addToHistory(imageUrl, promptInput);
    } else {
      setStatus('Sorry, the sketch did not load in time. The server may be busy — please try again.', true);
    }
  };

  const timeoutId = setTimeout(() => finish(false), 45000);

  img.onload = function(){ finish(true); };
  img.onerror = function(){ finish(false); };
  img.src = imageUrl;
}

function showResult(imageUrl, captionText){
  const shortCaption = captionText.length > 60 ? captionText.slice(0,60)+'…' : captionText;
  document.getElementById('resultArea').innerHTML = `
    <div class="sketch-frame">
      <img src="${imageUrl}" alt="Generated sketch">
      <div class="caption">"${shortCaption}"</div>
    </div>
    <div class="actions">
      <button onclick="downloadImage('${imageUrl}')">⬇ Download</button>
      <button onclick="generateSketch()">🔄 Regenerate</button>
    </div>
  `;
}

function addToHistory(url, prompt){
  history.unshift({url, prompt});
  if(history.length > 9) history.pop();
  renderHistory();
}

function renderHistory(){
  if(history.length === 0) return;
  document.getElementById('historySection').style.display = 'block';
  const grid = document.getElementById('historyGrid');
  grid.innerHTML = history.map(h =>
    `<img src="${h.url}" title="${h.prompt}" onclick="window.open('${h.url}', '_blank')">`
  ).join('');
}

function downloadImage(url){
  fetch(url)
    .then(res => res.blob())
    .then(blob => {
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'pencil-sketch-' + Date.now() + '.png';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    })
    .catch(() => {
      window.open(url, '_blank');
    });
}

document.getElementById('prompt').addEventListener('keydown', function(e){
  if(e.key === 'Enter' && e.ctrlKey){
    generateSketch();
  }
});
</script>

</body>
</html>
