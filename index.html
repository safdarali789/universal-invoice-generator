<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Naqshify Studio</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="topbar">
    <div class="logo">Naqshify Studio</div>
    <div class="status">v1.0 Starter</div>
  </div>

  <div class="main">

    <div class="sidebar">
      <button onclick="setTool('select')">Select</button>
      <button onclick="setTool('rect')">Rectangle</button>
      <button onclick="setTool('circle')">Circle</button>
    </div>

    <div class="workspace">
      <canvas id="canvas"></canvas>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
